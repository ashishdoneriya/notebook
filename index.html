		}

		.editor-shell .CodeMirror pre,

		.editor-shell .CodeMirror .cm-header-2,
		.editor-shell .CodeMirror .HyperMD-header-2 {

		.editor-shell .CodeMirror .cm-header-3,
		.editor-shell .CodeMirror .HyperMD-header-3 {
			font-size: 1.4rem;

		.editor-shell .CodeMirror .cm-header-4,
		.editor-shell .CodeMirror .HyperMD-header-4 {

		.editor-shell .CodeMirror .cm-strong,

	{

</head>
<body>
	<noscript>
		<main style="padding:24px;font-family:Ubuntu,system-ui,sans-serif;color:#eee;background:#272822;min-height:100vh">
			<h1>Notebook - Fast Local Markdown Notes App</h1>
			<p>Notebook is a private, local-first markdown notes app. Enable JavaScript to use the editor and save notes in your browser.</p>
		</main>
	</noscript>

	<main id="vapp" v-cloak aria-label="Notebook markdown notes app">
		<h1 class="visually-hidden">Notebook - Fast Local Markdown Notes App</h1>
		<aside class="sidebar">
			<div
				v-for="title in notesTitle"
				:key="title"
				class="note-list-item"
			>
				<span
					class="note-title"
					:class="{ active: title === titleBeforeReplaced }"
					:title="title"
					@click="open(title)"
				>{{ title }}</span>

				<div class="list-options">
					<button class="icon-button" type="button" title="Download" @click="download(title)">
						<svg fill="#4CAF50" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
							<path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"></path>
							<path d="M0 0h24v24H0z" fill="none"></path>
						</svg>
					</button>

					<button class="icon-button" type="button" title="Delete" @click="deleteNote(title)">
						<svg fill="#F44336" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
							<path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path>
							<path d="M0 0h24v24H0z" fill="none"></path>
						</svg>
					</button>
				</div>
			</div>
		</aside>

		<main class="mainbody">
			<div class="heading">
				<input
					class="title-input"
					type="text"
					v-model="currentTitle"
					placeholder="Title"
					@keydown.ctrl.s.prevent="save"
					@keydown.meta.s.prevent="save"
				>

				<div class="menu">
					<button class="button info-background" type="button" @click="newNote">New</button>
					<button class="button success-background" type="button" @click="save">Save</button>
					<button class="button danger-background" type="button" @click="deleteNote()">Delete</button>
				</div>
			</div>

			<section class="editor-shell">
				<textarea ref="editor" spellcheck="false"></textarea>
			</section>
		</main>
	</div>

	<script>
		window.addEventListener('DOMContentLoaded', () => {
			if (!window.Vue || !window.EasyMDE) {
				document.body.innerHTML = '<div style="padding:20px;font-family:Ubuntu,system-ui;color:#eee;background:#272822;min-height:100vh">Failed to load Vue or EasyMDE from CDN.</div>';
				return;
			}

			const ignoredStorageKeys = new Set(['darkyMode', 'darkySupported', 'darkyState']);

		const app = Vue.createApp({
			data() {
				return {
					content: '',
					currentTitle: '',
					notesTitle: [],
					titleBeforeReplaced: '',
					editor: null
				};
			},

			created() {
				this.fillSideBar();
			},

			mounted() {
				this.initMarkdownEditor();
				document.addEventListener('keydown', this.handleGlobalSaveShortcut, false);
			},

			beforeUnmount() {
				document.removeEventListener('keydown', this.handleGlobalSaveShortcut, false);

				if (this.editor) {
					this.editor.toTextArea();
					this.editor = null;
				}
			},

			methods: {
				initMarkdownEditor() {
					this.editor = new EasyMDE({
						element: this.$refs.editor,
						initialValue: this.content,
						autofocus: true,
						spellChecker: false,
						forceSync: true,
						nativeSpellcheck: false,
						status: ['lines', 'words', 'cursor'],
						minHeight: 'calc(100vh - 92px)',
						toolbar: [
							'bold',
							'italic',
							'strikethrough',
							'heading',
							'|',
							'quote',
							'unordered-list',
							'ordered-list',
							'|',
							'code',
							'link',
							'image',
							'table',
							'horizontal-rule',
							'|',
							'clean-block',
							'|',
							'guide'
						],
						renderingConfig: {
							singleLineBreaks: false,
							codeSyntaxHighlighting: true
						}
					});

					this.editor.codemirror.on('change', () => {
						this.content = this.editor.value();
					});

					this.editor.codemirror.setOption('extraKeys', {
						'Ctrl-S': () => this.save(),
						'Cmd-S': () => this.save()
					});
				},

				fillSideBar() {
					this.notesTitle = Object.keys(localStorage)
						.filter((key) => !ignoredStorageKeys.has(key))
						.sort((first, second) => first.localeCompare(second));
				},

				open(title) {
					const noteContent = localStorage.getItem(title) || '';

					this.titleBeforeReplaced = title;
					this.currentTitle = title;
					this.content = noteContent;
					this.setEditorValue(noteContent);
				},

				newNote() {
					this.content = '';
					this.currentTitle = '';
					this.titleBeforeReplaced = '';
					this.setEditorValue('');
					this.focusEditor();
				},

				save() {
					this.syncFromEditor();

					if (!this.currentTitle.trim() && !this.titleBeforeReplaced && !this.content.trim()) {
						return;
					}

					if (!this.currentTitle.trim()) {
						this.currentTitle = new Date().toISOString().replace('T', ' ').slice(0, 19);
					}

					const nextTitle = this.currentTitle.trim();

					if (nextTitle !== this.titleBeforeReplaced && this.titleBeforeReplaced) {
						localStorage.removeItem(this.titleBeforeReplaced);
					}

					this.currentTitle = nextTitle;
					this.titleBeforeReplaced = nextTitle;
					localStorage.setItem(nextTitle, this.content);
					this.fillSideBar();
				},

				deleteNote(title) {
					if (title) {
						localStorage.removeItem(title);

						if (title === this.titleBeforeReplaced) {
							this.newNote();
						}

						this.fillSideBar();
						return;
					}

					if (this.titleBeforeReplaced) {
						localStorage.removeItem(this.titleBeforeReplaced);
					}

					if (this.currentTitle) {
						localStorage.removeItem(this.currentTitle);
					}

					this.newNote();
					this.fillSideBar();
				},

				download(title) {
					if (title === null || title === undefined) {
						this.save();
						title = this.currentTitle;
					}

					if (!title) {
						return;
					}

					const noteContent = localStorage.getItem(title) || '';
					const blob = new Blob([noteContent], { type: 'text/markdown;charset=utf-8' });
					const element = document.createElement('a');
					const safeTitle = this.safeFileName(title);

					element.href = URL.createObjectURL(blob);
					element.download = `${safeTitle}.md`;
					document.body.appendChild(element);
					element.click();
					URL.revokeObjectURL(element.href);
					document.body.removeChild(element);
				},

				setEditorValue(value) {
					if (!this.editor) {
						return;
					}

					if (this.editor.value() !== value) {
						this.editor.value(value);
					}
				},

				syncFromEditor() {
					if (this.editor) {
						this.content = this.editor.value();
					}
				},

				focusEditor() {
					this.$nextTick(() => {
						if (this.editor) {
							this.editor.codemirror.focus();
						}
					});
				},

				handleGlobalSaveShortcut(event) {
					const isSaveShortcut = (navigator.platform.match('Mac') ? event.metaKey : event.ctrlKey) && event.key.toLowerCase() === 's';

					if (isSaveShortcut) {
						event.preventDefault();
						this.save();
					}
				},

				safeFileName(name) {
					return String(name)
						.trim()
						.replace(/[\\/:*?"<>|]/g, '-')
						.replace(/\s+/g, ' ')
						.slice(0, 120) || 'note';
				}
			}
		});

			app.mount('#vapp');
		});
	</script>
</body>
</html>
